<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Девица — Песни</title>
<style>
@font-face {
    font-family: 'Ruslan';
    src: url('RuslanDisplay.ttf') format('truetype');
    font-display: swap;
}
:root { --red: #F71015; --red-dim: rgba(247,16,21,.12); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #080808;
    color: #fff;
    font-family: Georgia, serif;
    min-height: 100vh;
    padding: 28px 20px 48px;
    max-width: 680px;
    margin: 0 auto;
}

h1 {
    font-family: 'Ruslan', Georgia, serif;
    color: var(--red);
    font-size: clamp(22px, 5vw, 36px);
    letter-spacing: .06em;
    text-shadow: 0 0 18px rgba(247,16,21,.4);
    margin-bottom: 6px;
}
.subtitle {
    font-size: 11px;
    color: rgba(255,255,255,.3);
    letter-spacing: .25em;
    text-transform: uppercase;
    margin-bottom: 28px;
}

/* кнопка открыть папку */
#openBtn {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--red-dim);
    border: 1px solid rgba(247,16,21,.4);
    color: rgba(247,16,21,.9);
    border-radius: 8px;
    padding: 11px 22px;
    font-family: Georgia, serif;
    font-size: 14px;
    cursor: pointer;
    transition: background .2s, border-color .2s;
    margin-bottom: 28px;
}
#openBtn:hover { background: rgba(247,16,21,.18); border-color: rgba(247,16,21,.7); }

/* не поддерживается */
#noSupport {
    background: rgba(255,200,0,.08);
    border: 1px solid rgba(255,200,0,.3);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    color: rgba(255,200,0,.85);
    margin-bottom: 20px;
    display: none;
}

/* список слотов */
#songList { margin-bottom: 32px; }

.slot {
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color .2s;
}
.slot:has(.slot-row:hover) { border-color: rgba(255,255,255,.15); }

.slot-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,.025);
}

.slot-num {
    font-family: 'Ruslan', Georgia, serif;
    font-size: 18px;
    color: var(--red);
    width: 28px;
    flex-shrink: 0;
    text-align: center;
}

.slot-info { flex: 1; min-width: 0; }
.slot-name {
    font-size: 14px;
    color: rgba(255,255,255,.85);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.slot-file {
    font-size: 11px;
    color: rgba(255,255,255,.28);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
}
.slot-empty .slot-name { color: rgba(255,255,255,.22); font-style: italic; }
.slot-empty .slot-file { display: none; }

.slot-actions { display: flex; gap: 6px; flex-shrink: 0; }
.act-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,.12);
    color: rgba(255,255,255,.4);
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 13px;
    cursor: pointer;
    transition: color .18s, border-color .18s, background .18s;
    white-space: nowrap;
}
.act-btn:hover { color: rgba(255,255,255,.85); border-color: rgba(255,255,255,.35); background: rgba(255,255,255,.06); }
.act-btn.danger:hover { color: var(--red); border-color: rgba(247,16,21,.5); background: rgba(247,16,21,.08); }
.act-btn.add-btn { color: rgba(247,16,21,.6); border-color: rgba(247,16,21,.25); }
.act-btn.add-btn:hover { color: var(--red); border-color: rgba(247,16,21,.6); background: var(--red-dim); }

/* форма переименования / добавления (раскрывается под строкой) */
.slot-form {
    display: none;
    background: rgba(255,255,255,.035);
    border-top: 1px solid rgba(255,255,255,.07);
    padding: 12px 14px;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
}
.slot-form.open { display: flex; }

.slot-form label { font-size: 12px; color: rgba(255,255,255,.4); flex-basis: 100%; }

.form-input {
    flex: 1; min-width: 160px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 6px;
    color: #fff;
    font-family: Georgia, serif;
    font-size: 14px;
    padding: 7px 11px;
    outline: none;
    transition: border-color .18s;
}
.form-input:focus { border-color: rgba(247,16,21,.6); }

.form-file-label {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,.04);
    border: 1px dashed rgba(255,255,255,.2);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    color: rgba(255,255,255,.5);
    cursor: pointer;
    transition: border-color .18s, color .18s;
}
.form-file-label:hover { border-color: rgba(247,16,21,.5); color: rgba(247,16,21,.8); }
.form-file-label input { display: none; }
.chosen-file { font-size: 11px; color: rgba(255,255,255,.35); flex-basis: 100%; }

.btn-save {
    background: var(--red);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: Georgia, serif;
    font-size: 13px;
    padding: 8px 18px;
    cursor: pointer;
    transition: opacity .18s;
}
.btn-save:hover { opacity: .85; }
.btn-save:disabled { opacity: .3; cursor: default; }

.btn-cancel {
    background: transparent;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 6px;
    color: rgba(255,255,255,.4);
    font-family: Georgia, serif;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    transition: color .18s, border-color .18s;
}
.btn-cancel:hover { color: rgba(255,255,255,.75); border-color: rgba(255,255,255,.3); }

/* прогресс копирования */
.copy-progress {
    font-size: 12px;
    color: rgba(255,200,100,.7);
    flex-basis: 100%;
    display: none;
}

/* подсказка */
.hint {
    font-size: 12px;
    color: rgba(255,255,255,.22);
    line-height: 1.7;
    border-top: 1px solid rgba(255,255,255,.06);
    padding-top: 20px;
    margin-top: 8px;
}
.hint b { color: rgba(255,255,255,.45); }

a.back {
    display: inline-block;
    font-size: 12px;
    color: rgba(247,16,21,.6);
    text-decoration: none;
    letter-spacing: .1em;
    margin-bottom: 18px;
}
a.back:hover { color: var(--red); }
</style>
</head>
<body>

<a class="back" href="index.html">← Назад к приложению</a>

<h1>ДЕВИЦА</h1>
<div class="subtitle">Управление песнями</div>

<div id="noSupport">
    ⚠ Ваш браузер не поддерживает работу с файлами.<br>
    Используйте <b>Google Chrome</b> или <b>Microsoft Edge</b>.
</div>

<button id="openBtn">📁 Открыть папку sound/</button>

<div id="songList"></div>

<div class="hint" id="hint" style="display:none">
    <b>Формат файлов:</b> <code>1(Калинка).mp3</code> — цифра, название в скобках, расширение.<br>
    Поддерживаются форматы: mp3, ogg, wav, m4a, aac.
</div>

<script>
const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX'];
const EXTS  = ['mp3','ogg','wav','m4a','aac'];

let dirHandle = null;
let slots = Array.from({length: 9}, (_, i) => ({
    num: i + 1, name: '', file: '', handle: null
}));

/* ── поддержка API ── */
if (!('showDirectoryPicker' in window)) {
    document.getElementById('noSupport').style.display = 'block';
    document.getElementById('openBtn').disabled = true;
}

document.getElementById('openBtn').addEventListener('click', async () => {
    try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        await scan();
    } catch(e) {
        if (e.name !== 'AbortError') alert('Ошибка: ' + e.message);
    }
});

/* ── сканировать папку ── */
async function scan() {
    slots.forEach(s => { s.name = ''; s.file = ''; s.handle = null; });
    for await (const [name, handle] of dirHandle.entries()) {
        if (handle.kind !== 'file') continue;
        const m = name.match(/^(\d+)\(([^)]+)\)\.(\w+)$/i);
        if (!m) continue;
        const num = +m[1], sName = m[2], ext = m[3].toLowerCase();
        if (num < 1 || num > 9 || !EXTS.includes(ext)) continue;
        const slot = slots.find(s => s.num === num);
        if (!slot) continue;
        slot.name = sName; slot.file = name; slot.handle = handle;
    }
    render();
}

/* ── отрисовка списка ── */
function render() {
    document.getElementById('hint').style.display = 'block';
    const list = document.getElementById('songList');
    list.innerHTML = '';
    slots.forEach(slot => {
        const has = !!slot.file;
        const div = document.createElement('div');
        div.className = 'slot' + (has ? '' : ' slot-empty');
        div.id = `slot-${slot.num}`;

        div.innerHTML = `
        <div class="slot-row">
            <div class="slot-num">${ROMAN[slot.num - 1]}</div>
            <div class="slot-info">
                <div class="slot-name">${has ? esc(slot.name) : 'нет файла'}</div>
                <div class="slot-file">${esc(slot.file)}</div>
            </div>
            <div class="slot-actions">
                ${has
                    ? `<button class="act-btn" onclick="openRename(${slot.num})">✏ Имя</button>
                       <button class="act-btn danger" onclick="doDelete(${slot.num})">🗑</button>`
                    : ''
                }
                <button class="act-btn add-btn" onclick="openAdd(${slot.num})">+ Добавить</button>
            </div>
        </div>
        <div class="slot-form" id="form-${slot.num}"></div>`;

        list.appendChild(div);
    });
}

/* ── форма переименования ── */
function openRename(num) {
    closeAllForms();
    const slot = slots.find(s => s.num === num);
    const form = document.getElementById(`form-${num}`);
    form.innerHTML = `
        <label>Новое название песни</label>
        <input class="form-input" id="ri-${num}" value="${esc(slot.name)}" placeholder="Название">
        <button class="btn-save" onclick="doRename(${num})">Сохранить</button>
        <button class="btn-cancel" onclick="closeAllForms()">Отмена</button>`;
    form.classList.add('open');
    const inp = document.getElementById(`ri-${num}`);
    inp.focus(); inp.select();
    inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') doRename(num);
        if (e.key === 'Escape') closeAllForms();
    });
}

async function doRename(num) {
    const slot = slots.find(s => s.num === num);
    const newName = document.getElementById(`ri-${num}`).value.trim();
    if (!newName) return;
    if (!dirHandle) return;

    const ext = slot.file.split('.').pop();
    const newFilename = `${num}(${newName}).${ext}`;
    if (newFilename === slot.file) { closeAllForms(); return; }

    try {
        const file   = await slot.handle.getFile();
        const buf    = await file.arrayBuffer();
        const newH   = await dirHandle.getFileHandle(newFilename, { create: true });
        const wr     = await newH.createWritable();
        await wr.write(buf); await wr.close();
        await dirHandle.removeEntry(slot.file);
        await scan();
    } catch(e) { alert('Ошибка переименования: ' + e.message); }
}

/* ── форма добавления ── */
function openAdd(num) {
    closeAllForms();
    const form = document.getElementById(`form-${num}`);
    form.innerHTML = `
        <label>Аудиофайл и название для слота ${ROMAN[num-1]}</label>
        <label class="form-file-label">
            🎵 Выбрать файл
            <input type="file" accept="audio/*" id="fi-${num}" onchange="onFileChosen(${num})">
        </label>
        <input class="form-input" id="ni-${num}" placeholder="Название песни" style="min-width:140px">
        <div class="chosen-file" id="cf-${num}"></div>
        <div class="copy-progress" id="cp-${num}">Копирование...</div>
        <button class="btn-save" id="bs-${num}" onclick="doAdd(${num})" disabled>Сохранить</button>
        <button class="btn-cancel" onclick="closeAllForms()">Отмена</button>`;
    form.classList.add('open');
}

function onFileChosen(num) {
    const inp  = document.getElementById(`fi-${num}`);
    const ni   = document.getElementById(`ni-${num}`);
    const cf   = document.getElementById(`cf-${num}`);
    const bs   = document.getElementById(`bs-${num}`);
    if (!inp.files[0]) return;
    const f = inp.files[0];
    cf.textContent = f.name;
    /* предзаполнить название из имени файла, если пусто */
    if (!ni.value.trim()) {
        let guess = f.name.replace(/\.[^.]+$/, '');
        const m = guess.match(/^\d+\(([^)]+)\)$/);
        ni.value = m ? m[1] : guess;
    }
    ni.focus(); ni.select();
    bs.disabled = false;
    ni.addEventListener('input', () => { bs.disabled = !ni.value.trim(); });
    ni.addEventListener('keydown', e => { if (e.key === 'Enter' && !bs.disabled) doAdd(num); });
}

async function doAdd(num) {
    const fi   = document.getElementById(`fi-${num}`);
    const ni   = document.getElementById(`ni-${num}`);
    const cp   = document.getElementById(`cp-${num}`);
    const bs   = document.getElementById(`bs-${num}`);
    if (!fi.files[0] || !ni.value.trim()) return;

    const file = fi.files[0];
    const name = ni.value.trim();
    const ext  = file.name.split('.').pop().toLowerCase();
    if (!EXTS.includes(ext)) { alert('Формат не поддерживается. Используйте mp3, ogg, wav, m4a, aac.'); return; }

    const existing = slots.find(s => s.num === num && s.file);
    if (existing) {
        if (!confirm(`Слот ${ROMAN[num-1]} занят («${existing.name}»). Заменить?`)) return;
    }

    const filename = `${num}(${name}).${ext}`;
    cp.style.display = 'block';
    bs.disabled = true;

    try {
        if (existing) await dirHandle.removeEntry(existing.file);
        const buf = await file.arrayBuffer();
        const h   = await dirHandle.getFileHandle(filename, { create: true });
        const wr  = await h.createWritable();
        await wr.write(buf); await wr.close();
        await scan();
    } catch(e) {
        cp.style.display = 'none';
        bs.disabled = false;
        alert('Ошибка: ' + e.message);
    }
}

/* ── удаление ── */
async function doDelete(num) {
    const slot = slots.find(s => s.num === num);
    if (!slot?.file) return;
    if (!confirm(`Удалить «${slot.name}»?\n${slot.file}`)) return;
    try {
        await dirHandle.removeEntry(slot.file);
        await scan();
    } catch(e) { alert('Ошибка: ' + e.message); }
}

function closeAllForms() {
    document.querySelectorAll('.slot-form.open').forEach(f => {
        f.classList.remove('open');
        f.innerHTML = '';
    });
}

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
