<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Девица — Песни</title>
<style>
@font-face { font-family:'Ruslan'; src:url('RuslanDisplay.ttf') format('truetype'); }

:root {
    --red:   #F71015;
    --bg:    #080808;
    --card:  #111;
    --line:  rgba(255,255,255,.07);
    --muted: rgba(255,255,255,.3);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

body {
    background: var(--bg);
    color: #fff;
    font-family: Georgia, serif;
    min-height: 100vh;
    padding: 32px 20px 60px;
}

.wrap { max-width: 700px; margin: 0 auto; }

/* шапка */
.top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px; }
h1 { font-family:'Ruslan',Georgia,serif; font-size:clamp(22px,5vw,34px); color:var(--red);
     letter-spacing:.06em; text-shadow:0 0 18px rgba(247,16,21,.35); }
a.back { font-size:12px; color:rgba(247,16,21,.5); text-decoration:none; letter-spacing:.1em; }
a.back:hover { color:var(--red); }
.sub { font-size:11px; letter-spacing:.25em; text-transform:uppercase; color:rgba(255,255,255,.25); margin-bottom:28px; }

/* статус соединения */
#status {
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:var(--muted);
    margin-bottom:22px;
}
.dot { width:7px; height:7px; border-radius:50%; background:#444; flex-shrink:0; }
.dot.ok  { background:#2ecc71; box-shadow:0 0 6px #2ecc71; }
.dot.err { background:var(--red); box-shadow:0 0 6px var(--red); }

/* drag-over подсветка всего экрана */
body.drag-over::after {
    content:'Отпустите для загрузки';
    position:fixed; inset:0; background:rgba(247,16,21,.12);
    border:3px dashed rgba(247,16,21,.5);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; color:rgba(247,16,21,.8);
    pointer-events:none; z-index:999;
}

/* список слотов */
.slots { display:flex; flex-direction:column; gap:6px; margin-bottom:32px; }

.slot {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color .2s;
}
.slot.occupied { border-color: rgba(247,16,21,.2); }
.slot.drag-target { border-color: var(--red) !important; background: rgba(247,16,21,.06); }

.slot-main {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
}

.num {
    font-family:'Ruslan',Georgia,serif;
    font-size:20px; color:var(--red); width:28px;
    text-align:center; flex-shrink:0;
}

.info { flex:1; min-width:0; }
.sname {
    font-size:14px; color:rgba(255,255,255,.85);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    cursor:pointer; display:inline-block; max-width:100%;
}
.sname:hover { color:#fff; }
.sname.empty { color:rgba(255,255,255,.2); font-style:italic; cursor:default; }
.fname { font-size:11px; color:rgba(255,255,255,.22); margin-top:2px;
         white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* мини-плеер */
.player { display:flex; align-items:center; gap:8px; margin-top:6px; }
.play-btn {
    width:26px; height:26px; border-radius:50%; border:1px solid rgba(247,16,21,.4);
    background:rgba(247,16,21,.08); color:rgba(247,16,21,.8);
    font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:background .15s;
}
.play-btn:hover { background:rgba(247,16,21,.22); }
.play-btn.playing { background:var(--red); color:#fff; border-color:var(--red); }
.pbar-wrap { flex:1; height:3px; background:rgba(255,255,255,.08); border-radius:3px; cursor:pointer; }
.pbar { height:100%; background:var(--red); border-radius:3px; width:0%; transition:width .3s linear; }
.ptime { font-size:10px; color:rgba(255,255,255,.25); font-family:'Courier New',monospace; flex-shrink:0; }

/* кнопки действий */
.actions { display:flex; gap:6px; flex-shrink:0; align-items:center; }

.btn {
    background:transparent; border:1px solid rgba(255,255,255,.1);
    color:rgba(255,255,255,.35); border-radius:7px;
    padding:5px 10px; font-size:12px; font-family:Georgia,serif;
    cursor:pointer; transition:all .15s; white-space:nowrap;
}
.btn:hover { color:rgba(255,255,255,.75); border-color:rgba(255,255,255,.3); }
.btn.red  { border-color:rgba(247,16,21,.2); color:rgba(247,16,21,.4); }
.btn.red:hover { background:rgba(247,16,21,.1); color:var(--red); border-color:rgba(247,16,21,.6); }
.btn.add  { border-color:rgba(247,16,21,.2); color:rgba(247,16,21,.5); }
.btn.add:hover { background:rgba(247,16,21,.08); color:var(--red); border-color:rgba(247,16,21,.5); }

/* форма переименования */
.rename-form {
    display:none; padding:10px 14px 12px;
    border-top:1px solid var(--line);
    background:rgba(255,255,255,.02);
    gap:8px; flex-wrap:wrap; align-items:center;
}
.rename-form.open { display:flex; }
.rename-form label { font-size:11px; color:var(--muted); flex-basis:100%; }
.r-input {
    flex:1; min-width:180px;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.15);
    border-radius:7px; color:#fff; font-family:Georgia,serif; font-size:14px;
    padding:7px 11px; outline:none; transition:border-color .15s;
}
.r-input:focus { border-color:rgba(247,16,21,.55); }
.btn-save {
    background:var(--red); border:none; border-radius:7px; color:#fff;
    padding:8px 18px; font-family:Georgia,serif; font-size:13px;
    cursor:pointer; transition:opacity .15s;
}
.btn-save:hover { opacity:.85; }

/* панель загрузки */
.upload-panel {
    background: var(--card);
    border: 1px dashed rgba(247,16,21,.25);
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    transition: border-color .2s, background .2s;
    cursor: pointer;
    margin-bottom: 16px;
}
.upload-panel:hover,
.upload-panel.drag { border-color:var(--red); background:rgba(247,16,21,.06); }
.upload-icon { font-size:32px; margin-bottom:8px; }
.upload-text { font-size:14px; color:rgba(255,255,255,.5); }
.upload-text b { color:rgba(247,16,21,.8); }
#fileInput { display:none; }

/* форма слота при drag */
.slot-num-label { font-size:12px; color:var(--muted); margin-bottom:6px; }
.slot-select {
    display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:14px;
}
.slot-chip {
    width:38px; height:38px; border-radius:50%;
    border:1px solid rgba(255,255,255,.15); background:transparent;
    color:rgba(255,255,255,.5); font-family:'Ruslan',Georgia,serif; font-size:14px;
    cursor:pointer; transition:all .15s;
}
.slot-chip:hover { border-color:rgba(247,16,21,.5); color:var(--red); }
.slot-chip.taken { border-color:rgba(247,16,21,.3); color:rgba(247,16,21,.6); }
.slot-chip.selected { background:var(--red); border-color:var(--red); color:#fff; }

/* модалка для выбора слота */
.modal-bg {
    position:fixed; inset:0; background:rgba(0,0,0,.75);
    display:flex; align-items:center; justify-content:center;
    z-index:500; opacity:0; pointer-events:none; transition:opacity .2s;
}
.modal-bg.open { opacity:1; pointer-events:all; }
.modal {
    background:#141414; border:1px solid rgba(247,16,21,.25);
    border-radius:16px; padding:26px 22px; width:min(460px,94vw);
    transform:translateY(10px); transition:transform .2s;
}
.modal-bg.open .modal { transform:none; }
.modal h2 { font-family:'Ruslan',Georgia,serif; font-size:18px; color:var(--red);
             margin-bottom:4px; }
.modal-sub { font-size:12px; color:var(--muted); margin-bottom:18px; }
.modal-name-row { display:flex; gap:8px; align-items:center; margin-bottom:18px; }
.modal-name-row label { font-size:12px; color:var(--muted); white-space:nowrap; }
.modal-name-row .r-input { flex:1; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; }

/* прогресс загрузки */
.upload-bar-wrap { height:3px; background:rgba(255,255,255,.06); border-radius:3px; margin-top:12px; display:none; }
.upload-bar { height:100%; width:0%; background:var(--red); border-radius:3px; transition:width .1s; }

/* тост */
.toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(10px);
    background:#1a1a1a; border:1px solid rgba(255,255,255,.1);
    border-radius:10px; padding:10px 20px; font-size:13px;
    color:rgba(255,255,255,.8); opacity:0; transition:opacity .25s, transform .25s;
    pointer-events:none; white-space:nowrap; z-index:999;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err  { border-color:rgba(247,16,21,.4); color:rgba(247,16,21,.85); }
</style>
</head>
<body>
<div class="wrap">

    <div class="top">
        <h1>ДЕВИЦА</h1>
        <a class="back" href="index.html">← Приложение</a>
    </div>
    <div class="sub">Управление песнями</div>

    <div id="status"><div class="dot" id="dot"></div><span id="statusText">Подключение...</span></div>

    <div class="slots" id="slots"></div>

    <div class="upload-panel" id="dropZone">
        <div class="upload-icon">🎵</div>
        <div class="upload-text">Перетащите MP3 сюда<br>или <b>нажмите для выбора</b></div>
        <div class="upload-bar-wrap" id="uploadBarWrap"><div class="upload-bar" id="uploadBar"></div></div>
        <input type="file" id="fileInput" accept="audio/*" multiple>
    </div>

</div>

<!-- модалка выбора слота -->
<div class="modal-bg" id="modalBg">
<div class="modal">
    <h2 id="modalTitle">Добавить песню</h2>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-name-row">
        <label>Название:</label>
        <input class="r-input" id="modalName" placeholder="Введите название">
    </div>
    <div class="slot-num-label">Слот (кнопка):</div>
    <div class="slot-select" id="slotChips"></div>
    <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Отмена</button>
        <button class="btn-save" id="modalSave" onclick="confirmUpload()">Сохранить</button>
    </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX'];
const EXTS  = ['mp3','ogg','wav','m4a','aac'];

let songs = Array.from({length:9}, (_,i) => ({num:i+1, name:'', file:''}));
let currentAudio = null, currentSlot = null, rafId = null;
let pendingFile = null, selectedSlot = null;

/* ══ API ══ */
async function api(method, path, body) {
    const opts = { method, headers:{} };
    if (body instanceof ArrayBuffer) {
        opts.body = body;
        opts.headers['Content-Type'] = 'application/octet-stream';
    } else if (body) {
        opts.body = JSON.stringify(body);
        opts.headers['Content-Type'] = 'application/json';
    }
    const r = await fetch(path, opts);
    if (!r.ok) {
        const err = new Error(await r.text().catch(() => r.statusText));
        err.status = r.status;
        throw err;
    }
    return r.json();
}

/* ══ ЗАГРУЗКА СПИСКА ══ */
async function loadSongs() {
    try {
        const files = await api('GET', '/api/songs');
        songs.forEach(s => { s.name = ''; s.file = ''; });
        files.forEach(f => {
            /* формат N(Любое название с (вложенными) скобками).ext  ИЛИ  N.ext */
            const m = f.match(/^(\d+)(?:\((.+)\))?\.(\w+)$/i);
            if (!m) return;
            const num = +m[1], name = m[2] || '', ext = m[3].toLowerCase();
            if (num < 1 || num > 9 || !EXTS.includes(ext)) return;
            const s = songs.find(s => s.num === num);
            if (s) { s.name = name; s.file = f; }
        });
        setStatus(true);
        render();
    } catch(e) {
        setStatus(false, e);
    }
}

function setStatus(ok, err) {
    document.getElementById('dot').className = 'dot ' + (ok ? 'ok' : 'err');
    let text;
    if (ok) {
        text = `Сервер подключён · ${songs.filter(s=>s.file).length} из 9 слотов заняты`;
    } else if (err?.status === 404) {
        text = 'Запустите сервер командой:  python3 server.py';
    } else {
        text = 'Нет соединения — запустите:  python3 server.py';
    }
    document.getElementById('statusText').textContent = text;
}

/* ══ РЕНДЕР ══ */
function render() {
    const el = document.getElementById('slots');
    el.innerHTML = '';
    songs.forEach(s => {
        const has = !!s.file;
        const div = document.createElement('div');
        div.className = 'slot' + (has ? ' occupied' : '');
        div.id = `slot-${s.num}`;
        div.dataset.num = s.num;

        div.innerHTML = `
        <div class="slot-main">
            <div class="num">${ROMAN[s.num-1]}</div>
            <div class="info">
                ${has
                    ? `<div class="sname" title="Нажмите для переименования" onclick="toggleRename(${s.num})">${esc(s.name)}</div>
                       <div class="fname">${esc(s.file)}</div>
                       <div class="player" id="player-${s.num}">
                           <button class="play-btn" id="playbtn-${s.num}" onclick="togglePlay(${s.num})">▶</button>
                           <div class="pbar-wrap" onclick="seekAudio(event,${s.num})">
                               <div class="pbar" id="pbar-${s.num}"></div>
                           </div>
                           <span class="ptime" id="ptime-${s.num}">--:--</span>
                       </div>`
                    : `<div class="sname empty">нет файла</div>`
                }
            </div>
            <div class="actions">
                ${has
                    ? `<button class="btn red" onclick="doDelete(${s.num})">🗑</button>`
                    : ''
                }
                <button class="btn add" onclick="addToSlot(${s.num})">+ Файл</button>
            </div>
        </div>
        <div class="rename-form" id="rf-${s.num}">
            <label>Новое название</label>
            <input class="r-input" id="ri-${s.num}" value="${esc(s.name)}">
            <button class="btn-save" onclick="doRename(${s.num})">Сохранить</button>
            <button class="btn" onclick="toggleRename(${s.num})">Отмена</button>
        </div>`;

        el.appendChild(div);

        /* drag-and-drop на слот */
        div.addEventListener('dragover',  e => { e.preventDefault(); div.classList.add('drag-target'); });
        div.addEventListener('dragleave', () => div.classList.remove('drag-target'));
        div.addEventListener('drop', e => {
            e.preventDefault();
            div.classList.remove('drag-target');
            const file = e.dataTransfer.files[0];
            if (file) openModal(file, s.num);
        });

        if (has) {
            const ri = document.getElementById(`ri-${s.num}`);
            ri.addEventListener('keydown', e => {
                if (e.key === 'Enter') doRename(s.num);
                if (e.key === 'Escape') toggleRename(s.num);
            });
        }
    });
}

/* ══ ПЕРЕИМЕНОВАНИЕ ══ */
function toggleRename(num) {
    const rf = document.getElementById(`rf-${num}`);
    const isOpen = rf.classList.contains('open');
    document.querySelectorAll('.rename-form.open').forEach(f => f.classList.remove('open'));
    if (!isOpen) {
        rf.classList.add('open');
        const inp = document.getElementById(`ri-${num}`);
        inp.focus(); inp.select();
    }
}

async function doRename(num) {
    const s = songs.find(s => s.num === num);
    const newName = document.getElementById(`ri-${num}`).value.trim();
    if (!newName || newName === s.name) { toggleRename(num); return; }
    const ext = s.file.split('.').pop();
    const newFile = `${num}(${newName}).${ext}`;
    try {
        await api('POST', '/api/rename', { old: s.file, new: newFile });
        toast(`Переименовано: ${newName}`);
        await loadSongs();
    } catch(e) { toast('Ошибка: ' + e.message, true); }
}

/* ══ УДАЛЕНИЕ ══ */
async function doDelete(num) {
    const s = songs.find(s => s.num === num);
    if (!confirm(`Удалить «${s.name}»?`)) return;
    stopAudio();
    try {
        await api('DELETE', `/api/songs/${encodeURIComponent(s.file)}`);
        toast('Удалено');
        await loadSongs();
    } catch(e) { toast('Ошибка: ' + e.message, true); }
}

/* ══ ЗАГРУЗКА ФАЙЛА ══ */
function addToSlot(num) {
    pendingFile = null; selectedSlot = num;
    const inp = document.getElementById('fileInput');
    inp.onchange = () => { if(inp.files[0]) openModal(inp.files[0], num); inp.value=''; };
    inp.click();
}

document.getElementById('dropZone').addEventListener('click', () => {
    const inp = document.getElementById('fileInput');
    inp.onchange = () => { [...inp.files].forEach(f => openModal(f, null)); inp.value=''; };
    inp.click();
});
document.getElementById('fileInput').addEventListener('change', () => {});

/* drag на всю страницу */
document.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('drag-over'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) document.body.classList.remove('drag-over'); });
document.addEventListener('drop', e => {
    e.preventDefault();
    document.body.classList.remove('drag-over');
    if (!e.target.closest('.slot')) {
        [...e.dataTransfer.files].forEach(f => openModal(f, null));
    }
});

/* открыть модалку выбора слота */
function openModal(file, preselect) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!EXTS.includes(ext)) { toast('Формат не поддерживается', true); return; }

    pendingFile = file;
    selectedSlot = preselect;

    document.getElementById('modalTitle').textContent = file.name;
    document.getElementById('modalSub').textContent = `Размер: ${(file.size/1024/1024).toFixed(1)} МБ`;

    /* имя из скобок если есть, иначе из имени файла */
    const m = file.name.match(/^\d+\(([^)]+)\)\.\w+$/i);
    let guess = m ? m[1] : file.name.replace(/\.[^.]+$/, '').replace(/^\d+\s*[-_.]?\s*/, '');
    document.getElementById('modalName').value = guess;

    /* чипы слотов */
    const chips = document.getElementById('slotChips');
    chips.innerHTML = '';
    songs.forEach(s => {
        const c = document.createElement('button');
        c.className = 'slot-chip' + (s.file ? ' taken' : '') + (s.num === preselect ? ' selected' : '');
        c.textContent = ROMAN[s.num-1];
        c.title = s.file ? `Занят: ${s.name}` : 'Свободен';
        c.onclick = () => {
            document.querySelectorAll('.slot-chip').forEach(x => x.classList.remove('selected'));
            c.classList.add('selected');
            selectedSlot = s.num;
        };
        chips.appendChild(c);
    });

    document.getElementById('modalBg').classList.add('open');
    document.getElementById('modalName').focus();
    document.getElementById('modalName').select();
    document.getElementById('modalSave').disabled = false;

    document.getElementById('modalName').onkeydown = e => {
        if (e.key === 'Enter') confirmUpload();
        if (e.key === 'Escape') closeModal();
    };
}

function closeModal() {
    document.getElementById('modalBg').classList.remove('open');
    pendingFile = null; selectedSlot = null;
}
document.getElementById('modalBg').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
});

async function confirmUpload() {
    if (!pendingFile) return;
    if (!selectedSlot) { toast('Выберите слот (кнопку I–IX)', true); return; }
    const name = document.getElementById('modalName').value.trim();
    if (!name) { document.getElementById('modalName').focus(); return; }

    const existing = songs.find(s => s.num === selectedSlot && s.file);
    if (existing && !confirm(`Слот ${ROMAN[selectedSlot-1]} занят («${existing.name}»). Заменить?`)) return;

    document.getElementById('modalSave').disabled = true;
    const file = pendingFile;  /* сохраняем до closeModal, который обнуляет pendingFile */
    const ext = file.name.split('.').pop().toLowerCase();
    const filename = `${selectedSlot}(${name}).${ext}`;

    const wrap = document.getElementById('uploadBarWrap');
    const bar  = document.getElementById('uploadBar');
    wrap.style.display = 'block'; bar.style.width = '0%';
    closeModal();

    try {
        if (existing) await api('DELETE', `/api/songs/${encodeURIComponent(existing.file)}`);
        const buf = await readFile(file, pct => { bar.style.width = pct + '%'; });
        await api('PUT', `/api/songs/${encodeURIComponent(filename)}`, buf);
        toast(`Добавлено: ${name}`);
        await loadSongs();
    } catch(e) {
        toast('Ошибка загрузки: ' + e.message, true);
    } finally {
        wrap.style.display = 'none'; bar.style.width = '0%';
    }
}

function readFile(file, onProgress) {
    return new Promise((res, rej) => {
        const fr = new FileReader();
        fr.onprogress = e => { if (e.lengthComputable) onProgress(Math.round(e.loaded/e.total*95)); };
        fr.onload = () => { onProgress(100); res(fr.result); };
        fr.onerror = rej;
        fr.readAsArrayBuffer(file);
    });
}

/* ══ МИНИ-ПЛЕЕР ══ */
function togglePlay(num) {
    const s = songs.find(s => s.num === num);
    if (!s?.file) return;

    if (currentSlot === num && currentAudio && !currentAudio.paused) {
        currentAudio.pause();
        updatePlayBtn(num, false);
        return;
    }
    stopAudio();
    currentAudio = new Audio(`sound/${encodeURIComponent(s.file)}`);
    currentSlot  = num;
    currentAudio.addEventListener('ended', () => { updatePlayBtn(num, false); stopAudio(); });
    currentAudio.play().catch(() => {});
    updatePlayBtn(num, true);
    rafId = requestAnimationFrame(function tick() {
        if (!currentAudio) return;
        const d = currentAudio.duration || 0;
        const c = currentAudio.currentTime;
        const pbar = document.getElementById(`pbar-${num}`);
        const pt   = document.getElementById(`ptime-${num}`);
        if (pbar) pbar.style.width = (d ? c/d*100 : 0) + '%';
        if (pt)   pt.textContent   = d ? fmt(c)+' / '+fmt(d) : fmt(c);
        rafId = requestAnimationFrame(tick);
    });
}

function stopAudio() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (currentSlot) {
        updatePlayBtn(currentSlot, false);
        const pb = document.getElementById(`pbar-${currentSlot}`);
        const pt = document.getElementById(`ptime-${currentSlot}`);
        if (pb) pb.style.width = '0%';
        if (pt) pt.textContent = '--:--';
        currentSlot = null;
    }
}

function updatePlayBtn(num, playing) {
    const b = document.getElementById(`playbtn-${num}`);
    if (b) { b.textContent = playing ? '⏸' : '▶'; b.classList.toggle('playing', playing); }
}

function seekAudio(e, num) {
    if (!currentAudio || currentSlot !== num) return;
    const r = e.currentTarget.getBoundingClientRect();
    currentAudio.currentTime = Math.max(0, (e.clientX - r.left) / r.width) * (currentAudio.duration || 0);
}

/* ══ УТИЛИТЫ ══ */
function fmt(s) {
    if (!isFinite(s)) return '--:--';
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, err) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (err ? ' err' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

/* ══ СТАРТ ══ */
loadSongs();
</script>
