<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>ДЕВИЦА</title>
    <style>
        @font-face {
            font-family: 'Ruslan';
            src: url('RuslanDisplay.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --red:      #F71015;
            --black:    #000000;
            --white:    #FFFFFF;
            --red-glow: rgba(247,16,21,0.5);
            --red-dim:  rgba(247,16,21,0.12);
            --CIRC:     289px; /* 2π×46, used in SVG ring */
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            -webkit-appearance: none; appearance: none;
        }

        html, body {
            width: 100vw; height: 100dvh;
            overflow: hidden;
            background: var(--black);
            font-family: 'Ruslan', Georgia, serif;
        }

        body { opacity: 0; animation: fadeIn .6s ease .1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* ══ LAYOUT ══ */
        .app {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
        }

        .left {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column;
            padding: 2.5vmin 3.5vmin 1.5vmin;
            gap: 1.2vmin;
            overflow: hidden;
            background: var(--black);
            position: relative;
        }

        /* ══ УГЛОВАЯ ИЛЛЮСТРАЦИЯ ══ */
        .woman-corner {
            position: absolute;
            bottom: 0; right: 0;
            height: 65vh; width: auto;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0.82;
            z-index: 1;
        }

        /* ══ ЗАГОЛОВОК ══ */
        .header {
            flex-shrink: 0;
            text-align: center;
        }

        .title {
            font-size: clamp(28px, 9.5vmin, 90px);
            color: var(--red);
            letter-spacing: .06em;
            text-shadow: 0 0 18px rgba(247,16,21,.55), 0 0 50px rgba(247,16,21,.2);
            line-height: .95;
        }

        .subtitle {
            font-size: clamp(9px, 1.5vmin, 15px);
            color: rgba(255,255,255,.3);
            letter-spacing: .32em;
            text-transform: uppercase;
            margin-top: .4vmin;
        }

        /* ══ РАЗДЕЛИТЕЛЬ ══ */
        .divider {
            flex-shrink: 0; height: 1px;
            background: linear-gradient(to right, var(--red), transparent);
            opacity: .35;
        }

        /* ══ СЕЙЧАС ИГРАЕТ (под эквалайзером) ══ */
        .now-playing {
            flex-shrink: 0;
            padding: 0 .5vmin;
            position: relative; z-index: 2;
        }
        .np-info {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 2vmin;
            margin-bottom: .65vmin;
            min-height: clamp(14px, 2.4vmin, 22px); /* фиксированная высота — верстка не прыгает */
        }
        .np-name {
            font-family: 'Ruslan', Georgia, serif;
            font-size: clamp(10px, 1.9vmin, 18px);
            color: rgba(255,255,255,.28);
            letter-spacing: .1em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1;
            transition: color .35s, text-shadow .35s;
        }
        .np-name.active {
            color: var(--red);
            text-shadow: 0 0 10px var(--red-glow);
        }
        .np-time {
            font-family: 'Courier New', monospace;
            font-size: clamp(9px, 1.45vmin, 13px);
            color: rgba(255,255,255,.2);
            flex-shrink: 0;
            letter-spacing: .04em;
            transition: color .35s;
        }
        .np-time.active { color: rgba(247,16,21,.7); }

        /* прогресс-полоска */
        .np-bar {
            width: 100%; height: 2px;
            background: rgba(255,255,255,.06);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .np-bar::before {
            content: ''; position: absolute; inset: -5px;
        }
        .np-fill {
            height: 100%; width: 0%;
            background: linear-gradient(to right, rgba(247,16,21,.9), var(--red));
            border-radius: 2px;
            transition: width .3s linear;
            position: relative;
        }
        .np-fill::after {
            content: '';
            position: absolute; right: -3px; top: 50%;
            transform: translateY(-50%);
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--white);
            box-shadow: 0 0 5px var(--red-glow);
            opacity: 0; transition: opacity .25s;
        }
        .np-name.active ~ * .np-fill::after,
        .np-fill.has-dot::after { opacity: 1; }

        /* ══ ВИЗУАЛИЗАТОР ══ */
        .visualizer {
            flex-shrink: 0;
            height: clamp(28px, 5.5vh, 65px);
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 8px;
            padding: 0 1vmin;
            position: relative; z-index: 2;
            background: #000;
        }
        .viz-bar {
            flex: 1;
            max-width: clamp(6px, 1.35vmin, 14px);
            background-image: url('images/береза.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            mix-blend-mode: screen;
            border-radius: 2px 2px 0 0;
            clip-path: inset(100% 0 0 0); /* шторка снизу — без сжатия */
            opacity: 0;
            will-change: clip-path;
        }
        .visualizer.active .viz-bar { opacity: 1; }

        /* ══ ОБЁРТКА КНОПОК ══ */
        .buttons-wrapper {
            flex: 1; min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative; z-index: 2;
        }

        /* ══ СЕТКА КНОПОК ══ */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2.2vmin;
            width:  min(86vw, 50vh);
            height: min(86vw, 50vh);
        }

        /* ══ КНОПКА ПЕСНИ ══ */
        .song-btn {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(247,16,21,.5);
            background: rgba(247,16,21,.05);
            cursor: pointer;
            position: relative; outline: none;
            touch-action: manipulation;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: visible; /* кольцо выходит за пределы кнопки */
            transition: border-color .15s, background .15s, transform .1s;
        }
        .song-btn::before {
            content: ''; position: absolute; inset: 12%;
            border-radius: 50%;
            border: 1px solid rgba(247,16,21,.2);
            pointer-events: none;
            transition: border-color .15s;
        }

        /* SVG кольцо прогресса */
        .progress-ring {
            position: absolute; inset: -5px;
            width: calc(100% + 10px);
            height: calc(100% + 10px);
            transform: rotate(-90deg);
            pointer-events: none;
            opacity: 0;
            transition: opacity .4s;
        }
        .song-btn.playing .progress-ring { opacity: 1; }
        .ring-bg   { fill: none; stroke: rgba(247,16,21,.15); stroke-width: 2.5; }
        .ring-fill {
            fill: none;
            stroke: var(--red); stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 283;   /* 2π×45 ≈ 283 */
            stroke-dashoffset: 283;
            filter: drop-shadow(0 0 4px rgba(247,16,21,.9));
        }

        .btn-num {
            font-family: 'Ruslan', Georgia, serif;
            font-size: clamp(14px, 6vmin, 58px);
            color: var(--white); line-height: 1;
            text-shadow: 0 1px 6px rgba(0,0,0,.9);
            transition: color .15s, text-shadow .15s;
            position: relative; z-index: 1;
        }

        /* Нажатие */
        .song-btn:active { transform: scale(.91); }

        /* Играет */
        .song-btn.playing {
            background: var(--red);
            border-color: var(--red);
            animation: btn-glow 2s ease-in-out infinite;
        }
        .song-btn.playing::before { border-color: rgba(255,255,255,.35); }
        .song-btn.playing .btn-num { text-shadow: 0 0 1.5vmin rgba(255,255,255,.6); }

        @keyframes btn-glow {
            0%,100% { box-shadow: 0 0 3vmin rgba(247,16,21,.7),  0 0 7vmin rgba(247,16,21,.25); }
            50%      { box-shadow: 0 0 5vmin rgba(247,16,21,.95), 0 0 12vmin rgba(247,16,21,.4); }
        }

        /* Загрузка */
        .song-btn.loading .btn-num { opacity: .25; }
        .song-btn.loading::after {
            content: ''; position: absolute; inset: 18%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--red);
            animation: spin .75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }


        /* ══ СТОП ══ */
        .stop-btn {
            flex-shrink: 0; width: 100%;
            padding: 1.4vmin;
            background: transparent;
            border: 1px solid rgba(247,16,21,.25);
            border-radius: 1.2vmin;
            color: rgba(255,255,255,.28);
            font-family: 'Ruslan', Georgia, serif;
            font-size: clamp(10px, 2vmin, 19px);
            letter-spacing: .22em;
            cursor: pointer; touch-action: manipulation;
            position: relative; z-index: 2;
            transition: all .15s ease;
        }
        .stop-btn:active {
            background: rgba(247,16,21,.15);
            color: var(--red); border-color: var(--red);
            box-shadow: 0 0 15px rgba(247,16,21,.3);
            transform: scale(.98);
        }

        /* ══ ПОДВАЛ ══ */
        .footer {
            flex-shrink: 0;
            display: flex; align-items: center;
            justify-content: space-between;
            gap: 2vmin;
            position: relative; z-index: 2;
        }
        .footer-left { display: flex; align-items: center; gap: 1.5vmin; }
        .footer-ring {
            height: 5.5vmin; width: 5.5vmin;
            object-fit: contain;
            filter: brightness(0) invert(1); opacity: .28;
        }
        .footer-text {
            font-size: clamp(7px, 1.1vmin, 11px);
            color: rgba(255,255,255,.18);
            letter-spacing: .2em; text-transform: uppercase;
            font-family: Georgia, serif;
        }
        .qr-wrap {
            background: var(--white);
            border-radius: .6vmin;
            padding: .5vmin; line-height: 0; flex-shrink: 0;
        }
        .qr-img { display: block; width: 7vmin; height: 7vmin; }
    </style>
</head>
<body>
<div class="app">
    <div class="left">

        <!-- иллюстрация-декор -->
        <img class="woman-corner" src="images/1.png" alt="">

        <!-- заголовок -->
        <div class="header">
            <div class="title">ДЕВИЦА</div>
            <div class="subtitle">Старорусские Напевы</div>
        </div>

        <div class="divider"></div>

        <!-- визуализатор -->
        <div class="visualizer" id="visualizer"></div>

        <!-- название + время + полоска под эквалайзером -->
        <div class="now-playing">
            <div class="np-info">
                <span class="np-name" id="dispSong">— Выберите песню —</span>
                <span class="np-time" id="dispTime">--:--</span>
            </div>
            <div class="np-bar" id="progressBar">
                <div class="np-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>

        <!-- кнопки -->
        <div class="buttons-wrapper">
            <div class="buttons-grid" id="grid"></div>
        </div>

        <button class="stop-btn" id="stopBtn">◼ &nbsp; ОСТАНОВИТЬ</button>

        <div class="footer">
            <div class="footer-left">
                <img class="footer-ring" src="images/3.png" alt="">
                <span class="footer-text">Школа Креативных Индустрий</span>
            </div>
            <div class="qr-wrap">
                <img class="qr-img" src="images/2.png" alt="VK QR">
            </div>
        </div>

    </div>
</div>

<script>
/* ══ НАСТРОЙКА ══ */
const SONGS = [
    { num: 1, name: 'Песня первая'    },
    { num: 2, name: 'Песня вторая'    },
    { num: 3, name: 'Песня третья'    },
    { num: 4, name: 'Песня четвёртая' },
    { num: 5, name: 'Песня пятая'     },
    { num: 6, name: 'Песня шестая'    },
    { num: 7, name: 'Песня седьмая'   },
    { num: 8, name: 'Песня восьмая'   },
    { num: 9, name: 'Песня девятая'   },
];
const EXTS  = ['mp3','ogg','wav','m4a','aac'];
const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX'];
const CIRC  = 283; /* 2π×45 ≈ 283 — длина окружности SVG */

/* ══ СОСТОЯНИЕ ══ */
let currentAudio  = null;
let currentBtn    = null;
let currentRing   = null;
let progressRaf   = null;
let vizRaf        = null;
let audioCtx      = null;
let analyser      = null;
let hasRealViz    = false;
let trackDuration = 0;

/* ══ ПОЛОСЫ ВИЗУАЛИЗАТОРА ══ */
const vizEl  = document.getElementById('visualizer');
const vizBars = [];
for (let i = 0; i < 20; i++) {
    const b = document.createElement('div');
    b.className = 'viz-bar';
    vizEl.appendChild(b);
    vizBars.push(b);
}

/* ── Попытка подключить Web Audio ДО play() ─────────────────
   Если браузер блокирует (file://, CORS) — просто не подключаем,
   аудио продолжит играть через нативный маршрут.            */
function tryConnectWebAudio(audio) {
    try {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            analyser.smoothingTimeConstant = 0.78;
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const src = audioCtx.createMediaElementSource(audio);
        src.connect(analyser);
        analyser.connect(audioCtx.destination);
        return true;
    } catch (e) {
        return false; /* audio играет нативно — ничего не сломано */
    }
}

/* ── Запуск визуализатора (real или fake) ─── */
function startVisualizer(audio) {
    vizEl.classList.add('active');
    hasRealViz = tryConnectWebAudio(audio);

    const data = hasRealViz ? new Uint8Array(analyser.frequencyBinCount) : null;
    /* fake: каждая полоса бежит к случайной цели */
    const targets  = vizBars.map(() => Math.random() * 0.65 + 0.2);
    const currents = vizBars.map(() => 0);

    function loop() {
        if (hasRealViz && analyser) {
            analyser.getByteFrequencyData(data);
            vizBars.forEach((bar, i) => {
                const v = Math.max(0.04, data[i] / 255);
                bar.style.clipPath = `inset(${((1 - v) * 100).toFixed(1)}% 0 0 0)`;
            });
        } else {
            vizBars.forEach((bar, i) => {
                if (Math.random() < 0.07) targets[i] = Math.random() * 0.7 + 0.15;
                currents[i] += (targets[i] - currents[i]) * 0.25;
                bar.style.clipPath = `inset(${((1 - currents[i]) * 100).toFixed(1)}% 0 0 0)`;
            });
        }
        vizRaf = requestAnimationFrame(loop);
    }
    loop();
}

function stopVisualizer() {
    if (vizRaf) { cancelAnimationFrame(vizRaf); vizRaf = null; }
    vizEl.classList.remove('active');
    vizBars.forEach(b => b.style.clipPath = 'inset(100% 0 0 0)');
}

/* ══ КНОПКИ + SVG КОЛЬЦО ══ */
const grid = document.getElementById('grid');

SONGS.forEach((song, i) => {
    const btn = document.createElement('button');
    btn.className = 'song-btn';

    /* SVG кольцо прогресса */
    const ns  = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.classList.add('progress-ring');

    const bg = document.createElementNS(ns, 'circle');
    bg.setAttribute('cx','50'); bg.setAttribute('cy','50');
    bg.setAttribute('r','45');  bg.classList.add('ring-bg');

    const fill = document.createElementNS(ns, 'circle');
    fill.setAttribute('cx','50'); fill.setAttribute('cy','50');
    fill.setAttribute('r','45');  fill.classList.add('ring-fill');
    fill.style.strokeDashoffset = CIRC; /* пусто */

    svg.appendChild(bg);
    svg.appendChild(fill);
    btn.appendChild(svg);
    btn.insertAdjacentHTML('beforeend', `<span class="btn-num">${ROMAN[i]}</span>`);

    btn.addEventListener('click', e => {
        handleClick(song, btn, fill);
        initGyro();
    });
    btn.addEventListener('touchstart', () => {}, { passive: true });
    grid.appendChild(btn);
});

document.getElementById('stopBtn').addEventListener('click', stopAll);

/* ══ RIPPLE ══ */
function addRipple(btn, e) {
    const r   = btn.getBoundingClientRect();
    const x   = (e.clientX ?? r.left + r.width  / 2) - r.left;
    const y   = (e.clientY ?? r.top  + r.height / 2) - r.top;
    const el  = document.createElement('div');
    el.className = 'ripple-el';
    const s = r.width;
    el.style.cssText = `width:${s}px;height:${s}px;left:${x-s/2}px;top:${y-s/2}px`;
    btn.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), { once: true });
}

/* ══ ВОСПРОИЗВЕДЕНИЕ ══ */
function handleClick(song, btn, ring) {
    if (currentBtn === btn) { stopAll(); return; }
    stopAll();
    btn.classList.add('loading');
    tryPlay(song, btn, ring, 0);
}

function tryPlay(song, btn, ring, idx) {
    if (idx >= EXTS.length) {
        btn.classList.remove('loading');
        setDisplay(`Файл не найден: sound/${song.num}`, false);
        return;
    }

    const audio = new Audio(`sound/${song.num}.${EXTS[idx]}`);

    audio.addEventListener('loadedmetadata', () => {
        trackDuration = audio.duration;
    }, { once: true });

    /* play() вызываем ПОСЛЕ tryConnectWebAudio — Web Audio уже готов */
    audio.play()
        .then(() => {
            btn.classList.remove('loading');
            currentAudio = audio;
            currentBtn   = btn;
            currentRing  = ring;
            btn.classList.add('playing');
            setDisplay(song.name, true);
            startVisualizer(audio);   /* подключает Web Audio или запускает fake */
            startProgress();
            audio.addEventListener('ended', stopAll, { once: true });
        })
        .catch(() => tryPlay(song, btn, ring, idx + 1));
}

function stopAll() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
    }
    if (currentBtn)  { currentBtn.classList.remove('playing', 'loading'); currentBtn = null; }
    if (currentRing) { currentRing.style.strokeDashoffset = CIRC; currentRing = null; }
    stopVisualizer();
    stopProgress();
    setDisplay('— Выберите песню —', false);
}

/* ══ ПРОГРЕСС (requestAnimationFrame) ══ */
function startProgress() {
    if (progressRaf) cancelAnimationFrame(progressRaf);
    const fill   = document.getElementById('progressFill');
    const timeEl = document.getElementById('dispTime');

    function tick() {
        if (!currentAudio) return;
        const dur = currentAudio.duration || trackDuration;
        const cur = currentAudio.currentTime;
        const pct = dur ? cur / dur : 0;

        fill.style.width = (pct * 100) + '%';
        fill.classList.toggle('has-dot', pct > 0);
        if (currentRing) currentRing.style.strokeDashoffset = CIRC * (1 - pct);
        timeEl.textContent = dur ? fmt(cur) + ' / ' + fmt(dur) : fmt(cur);

        progressRaf = requestAnimationFrame(tick);
    }
    tick();
}

function stopProgress() {
    if (progressRaf) { cancelAnimationFrame(progressRaf); progressRaf = null; }
    trackDuration = 0;
    const fill = document.getElementById('progressFill');
    fill.style.width = '0%';
    fill.classList.remove('has-dot');
    document.getElementById('dispTime').textContent = '--:--';
}

/* Перемотка: тап по дисплею */
document.getElementById('progressBar').addEventListener('click', e => {
    if (!currentAudio?.duration) return;
    const r = e.currentTarget.getBoundingClientRect();
    currentAudio.currentTime =
        Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * currentAudio.duration;
    e.stopPropagation();
});

/* ══ ДИСПЛЕЙ ══ */
function setDisplay(text, playing) {
    const name = document.getElementById('dispSong');
    name.textContent = text;
    name.classList.toggle('active', playing);
    document.getElementById('dispTime').classList.toggle('active', playing);
    if (!playing) document.getElementById('dispTime').textContent = '--:--';
}

/* ══ ПАРАЛЛАКС (ГИРОСКОП / МЫШЬ) ══ */
const _woman = document.querySelector('.woman-corner');
const _title  = document.querySelector('.title');
const _bwrap  = document.querySelector('.buttons-wrapper');

let ptx = 0, pty = 0, pcx = 0, pcy = 0;
let gyroActive = false, gyroAsked = false;

async function initGyro() {
    if (gyroAsked) return;
    gyroAsked = true;
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            if (await DeviceOrientationEvent.requestPermission() === 'granted') startGyro();
        } catch(e) {}
    } else {
        startGyro();
    }
}

function startGyro() {
    gyroActive = true;
    window.addEventListener('deviceorientation', e => {
        ptx = Math.max(-1, Math.min(1, (e.gamma || 0) / 22));
        pty = Math.max(-1, Math.min(1, ((e.beta || 45) - 45) / 22));
    });
}

/* мышь для десктопа */
document.addEventListener('mousemove', e => {
    if (gyroActive) return;
    ptx = (e.clientX / innerWidth  - 0.5) * 2;
    pty = (e.clientY / innerHeight - 0.5) * 2;
});

/* плавный параллакс через RAF */
(function parallaxLoop() {
    pcx += (ptx - pcx) * 0.07;
    pcy += (pty - pcy) * 0.07;
    if (_woman) _woman.style.transform = `translate(${pcx * 30}px, ${pcy * 18}px)`;
    if (_title)  _title.style.transform  = `translate(${-pcx * 10}px, ${-pcy * 6}px)`;
    if (_bwrap)  _bwrap.style.transform  = `translate(${pcx * 5}px, ${pcy * 3}px)`;
    requestAnimationFrame(parallaxLoop);
})();

/* ══ FULLSCREEN (клавиша F / двойной тап по заголовку) ══ */
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
    } else {
        document.exitFullscreen?.();
    }
}

document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

/* двойной тап (планшет) и двойной клик (десктоп) по заголовку */
let lastTap = 0;
const titleEl = document.querySelector('.title');
titleEl.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 300) { e.preventDefault(); toggleFullscreen(); }
    lastTap = now;
});
titleEl.addEventListener('dblclick', toggleFullscreen);

/* ══ УТИЛИТА ══ */
function fmt(s) {
    if (!isFinite(s)) return '--:--';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
</script>
