<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>ДЕВИЦА</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <div class="left">

            <!-- иллюстрация-декор -->
            <img class="woman-corner" src="images/1.png" alt="">

            <!-- заголовок -->
            <div class="header">
                <div class="title">ДЕВИЦА</div>
                <div class="subtitle">СЛУШАЙ РОССИЮ</div>
            </div>

            <div class="divider"></div>

            <!-- визуализатор -->
            <div class="visualizer" id="visualizer"></div>

            <!-- название + время + полоска под эквалайзером -->
            <div class="now-playing">
                <div class="np-info">
                    <span class="np-name" id="dispSong">— Выберите песню —</span>
                    <span class="np-time" id="dispTime">--:--</span>
                </div>
                <div class="np-bar" id="progressBar">
                    <div class="np-fill" id="progressFill" style="width:0%"></div>
                </div>
            </div>

            <!-- кнопки -->
            <div class="buttons-wrapper">
                <div class="buttons-grid" id="grid"></div>
            </div>

            <div class="footer">
                <div class="footer-btns">
                    <button class="icon-btn" id="settingsBtn" title="Настройки">⚙</button>
                    <button class="icon-btn stop-icon" id="stopBtn" title="Остановить">◼</button>
                </div>
                <div class="footer-center">
                    <img class="footer-ring" src="images/3.png" alt="">
                    <span class="footer-text">Школа Креативных Индустрий, г. Нестеров</span>
                </div>
                <div class="qr-wrap">
                    <img class="qr-img" src="images/2.png" alt="VK QR">
                </div>
            </div>

        </div>
    </div>

    <div class="film-vignette" id="filmVignette"></div>

    <!-- Диалог настроек -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <div class="settings-top-line"></div>
            <div class="settings-header">
                <span class="settings-title">Настройки</span>
                <button class="settings-close" id="settingsClose">✕</button>
            </div>
            <div class="settings-effects">
                <div class="setting-col">
                    <button class="setting-item" id="snowBtn">❄</button>
                    <span class="setting-label">Снег</span>
                </div>
                <div class="setting-col">
                    <button class="setting-item" id="leavesBtn">🍂</button>
                    <span class="setting-label">Листья</span>
                </div>
                <div class="setting-col">
                    <button class="setting-item" id="fireBtn">🔥</button>
                    <span class="setting-label">Огонь</span>
                </div>
                <div class="setting-col">
                    <button class="setting-item" id="ornamentsBtn">✾</button>
                    <span class="setting-label">Узоры</span>
                </div>
                <div class="setting-col">
                    <button class="setting-item" id="wakeLockBtn">☀</button>
                    <span class="setting-label">Экран</span>
                </div>
                <div class="setting-col">
                    <button class="setting-item" id="filmBtn">🎞</button>
                    <span class="setting-label">Плёнка</span>
                </div>
                <div class="setting-col">
                    <button class="setting-item" id="lightBtn">💡</button>
                    <span class="setting-label">Свет</span>
                </div>
                <div class="setting-col">
                    <button class="setting-item" id="shakeBtn">⚡</button>
                    <span class="setting-label">Тряска</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
