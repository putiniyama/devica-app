<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>ДЕВИЦА</title>
    <style>
        @font-face {
            font-family: 'Ruslan';
            src: url('RuslanDisplay.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --red:     #F71015;
            --black:   #000000;
            --white:   #FFFFFF;
            --red-dim:  rgba(247,16,21,0.12);
            --red-glow: rgba(247,16,21,0.45);
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            appearance: none;
            -webkit-appearance: none;
        }

        html, body {
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            background: var(--black);
            font-family: 'Ruslan', Georgia, serif;
        }

        body {
            opacity: 0;
            animation: fadeIn 0.6s ease 0.1s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* ═══════════════════════════════
           СЕТКА: левая панель + правая
        ═══════════════════════════════ */
        .app {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: 55fr 45fr;
        }

        /* ═══════════════════════════════
           ЛЕВАЯ ПАНЕЛЬ — все элементы
        ═══════════════════════════════ */
        .left {
            display: flex;
            flex-direction: column;
            padding: 3vmin 3.5vmin 2vmin;
            gap: 1.6vmin;
            overflow: hidden;
            background: var(--black);
            border-right: 1px solid rgba(247,16,21,0.25);
            position: relative;
            z-index: 1;
        }

        /* — заголовок — */
        .header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 2.5vmin;
        }

        .school-ring {
            height: 9vmin;
            width: 9vmin;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.65;
            flex-shrink: 0;
        }

        .title-block { flex: 1; min-width: 0; }

        .title {
            font-size: clamp(28px, 9.5vmin, 90px);
            color: var(--red);
            letter-spacing: 0.06em;
            text-shadow:
                0 0 18px rgba(247,16,21,0.55),
                0 0 50px rgba(247,16,21,0.2);
            line-height: 0.95;
        }

        .subtitle {
            font-size: clamp(9px, 1.6vmin, 16px);
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.32em;
            text-transform: uppercase;
            margin-top: 0.5vmin;
        }

        /* — разделитель — */
        .divider {
            flex-shrink: 0;
            height: 1px;
            background: linear-gradient(to right, var(--red) 0%, transparent 100%);
            opacity: 0.35;
        }

        /* ═══════════════════════════════
           LED-ДИСПЛЕЙ
        ═══════════════════════════════ */
        .display {
            flex-shrink: 0;
            background: #060606;
            border: 1px solid #181818;
            border-left: 3px solid var(--red);
            border-radius: 1vmin;
            padding: 1.3vmin 2.2vmin;
            display: flex;
            align-items: center;
            gap: 2vmin;
            position: relative;
            overflow: hidden;
        }
        /* CRT-строчки */
        .display::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg,
                transparent 0, transparent 3px,
                rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px);
            pointer-events: none;
        }

        .disp-icon {
            font-size: 3.5vmin;
            color: rgba(255,255,255,0.35);
            flex-shrink: 0;
            position: relative; z-index: 1;
            transition: color 0.3s;
        }
        .disp-icon.playing {
            color: var(--red);
            text-shadow: 0 0 10px var(--red-glow);
            animation: icon-blink 1.3s ease-in-out infinite;
        }
        @keyframes icon-blink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.2; }
        }

        .disp-text {
            flex: 1; min-width: 0;
            font-family: 'Courier New', monospace;
            position: relative; z-index: 1;
        }
        .disp-label {
            font-size: clamp(8px, 1.2vmin, 13px);
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .disp-song {
            font-size: clamp(11px, 2.2vmin, 20px);
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.06em;
            margin-top: 0.2vmin;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: color 0.2s;
        }
        .disp-song.active {
            color: var(--red);
            text-shadow: 0 0 8px var(--red-glow);
        }
        .disp-time {
            font-family: 'Courier New', monospace;
            font-size: clamp(10px, 1.9vmin, 18px);
            color: rgba(255,255,255,0.3);
            flex-shrink: 0;
            position: relative; z-index: 1;
        }

        /* ═══════════════════════════════
           ОБЁРТКА КНОПОК (центрирует)
        ═══════════════════════════════ */
        .buttons-wrapper {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ═══════════════════════════════
           СЕТКА КНОПОК (квадрат, vmin)
        ═══════════════════════════════ */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2.2vmin;
            width:  min(48vw, 52vh);
            height: min(48vw, 52vh);
        }

        /* ═══════════════════════════════
           КНОПКА ПЕСНИ
        ═══════════════════════════════ */
        .song-btn {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(247,16,21,0.5);
            background: rgba(247,16,21,0.05);
            cursor: pointer;
            position: relative;
            outline: none;
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6vmin;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
        }

        /* Внутреннее декоративное кольцо */
        .song-btn::before {
            content: '';
            position: absolute;
            inset: 12%;
            border-radius: 50%;
            border: 1px solid rgba(247,16,21,0.2);
            transition: border-color 0.15s;
            pointer-events: none;
        }

        .btn-num {
            font-family: 'Ruslan', Georgia, serif;
            font-size: clamp(14px, 6vmin, 58px);
            color: var(--white);
            line-height: 1;
            text-shadow: 0 1px 6px rgba(0,0,0,0.9);
            transition: color 0.15s, text-shadow 0.15s;
            position: relative; z-index: 1;
        }

        .btn-name {
            font-size: clamp(7px, 1.3vmin, 13px);
            color: rgba(255,255,255,0.28);
            text-align: center;
            padding: 0 8%;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            max-width: 90%;
            transition: color 0.15s;
            position: relative; z-index: 1;
            font-family: Georgia, serif;
        }

        /* Нажатие */
        .song-btn:active { transform: scale(0.91); }

        /* Играет */
        .song-btn.playing {
            background: var(--red);
            border-color: var(--red);
            box-shadow:
                0 0 3vmin rgba(247,16,21,0.7),
                0 0 7vmin rgba(247,16,21,0.25);
            animation: btn-glow 2s ease-in-out infinite;
        }
        .song-btn.playing::before { border-color: rgba(255,255,255,0.35); }
        .song-btn.playing .btn-num {
            text-shadow: 0 0 1.5vmin rgba(255,255,255,0.6);
        }
        .song-btn.playing .btn-name { color: rgba(255,255,255,0.75); }

        @keyframes btn-glow {
            0%,100% { box-shadow: 0 0 3vmin rgba(247,16,21,.7),  0 0 7vmin rgba(247,16,21,.25); }
            50%      { box-shadow: 0 0 5vmin rgba(247,16,21,.95), 0 0 12vmin rgba(247,16,21,.4); }
        }

        /* ═══════════════════════════════
           КНОПКА СТОП
        ═══════════════════════════════ */
        .stop-btn {
            flex-shrink: 0;
            width: 100%;
            padding: 1.6vmin;
            background: transparent;
            border: 1px solid rgba(247,16,21,0.25);
            border-radius: 1.2vmin;
            color: rgba(255,255,255,0.3);
            font-family: 'Ruslan', Georgia, serif;
            font-size: clamp(10px, 2.2vmin, 20px);
            letter-spacing: 0.22em;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.15s ease;
        }
        .stop-btn:active {
            background: rgba(247,16,21,0.15);
            color: var(--red);
            border-color: var(--red);
            box-shadow: 0 0 15px rgba(247,16,21,0.3);
            transform: scale(0.98);
        }

        /* ═══════════════════════════════
           ПОДВАЛ: QR + кольцо
        ═══════════════════════════════ */
        .footer {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2vmin;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 1.5vmin;
        }

        .footer-ring {
            height: 6vmin;
            width: 6vmin;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.3;
        }

        .footer-text {
            font-size: clamp(7px, 1.1vmin, 11px);
            color: rgba(255,255,255,0.18);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-family: Georgia, serif;
        }

        .qr-wrap {
            background: var(--white);
            border-radius: 0.6vmin;
            padding: 0.6vmin;
            line-height: 0;
            flex-shrink: 0;
        }
        .qr-img {
            display: block;
            width: 7.5vmin;
            height: 7.5vmin;
        }

        /* ═══════════════════════════════
           ПРАВАЯ ПАНЕЛЬ — иллюстрация
        ═══════════════════════════════ */
        .right {
            position: relative;
            overflow: hidden;
            background: var(--black);
        }

        .woman-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        /* Градиент слева — плавный переход к левой панели */
        .right::before {
            content: '';
            position: absolute;
            inset: 0 auto 0 0;
            width: 18%;
            background: linear-gradient(to right, #000 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }
        /* Лёгкий красный тинт снизу */
        .right::after {
            content: '';
            position: absolute;
            inset: 60% 0 0;
            background: linear-gradient(to top, rgba(247,16,21,0.08) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="app">

    <!-- ═══ ЛЕВАЯ ПАНЕЛЬ ═══ -->
    <div class="left">

        <div class="header">
            <img class="school-ring" src="images/3.png" alt="">
            <div class="title-block">
                <div class="title">ДЕВИЦА</div>
                <div class="subtitle">Старорусские Напевы</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="display">
            <div class="disp-icon" id="dispIcon">♪</div>
            <div class="disp-text">
                <div class="disp-label">Сейчас звучит</div>
                <div class="disp-song" id="dispSong">— Выберите песню —</div>
            </div>
            <div class="disp-time" id="dispTime"></div>
        </div>

        <div class="buttons-wrapper">
            <div class="buttons-grid" id="grid"></div>
        </div>

        <button class="stop-btn" id="stopBtn">◼ &nbsp; ОСТАНОВИТЬ</button>

        <div class="footer">
            <div class="footer-left">
                <img class="footer-ring" src="images/3.png" alt="">
                <span class="footer-text">Школа Креативных Индустрий</span>
            </div>
            <div class="qr-wrap">
                <img class="qr-img" src="images/2.png" alt="VK QR">
            </div>
        </div>

    </div>

    <!-- ═══ ПРАВАЯ ПАНЕЛЬ — ДЕВИЦА ═══ -->
    <div class="right">
        <img class="woman-img" src="images/1.png" alt="Девица">
    </div>

</div>

<script>
    /* ══════════════════════════════════
       НАСТРОЙКА: имена песен
       Файлы: sound/1.mp3 … sound/9.mp3
    ══════════════════════════════════ */
    const SONGS = [
        { num: 1, name: 'Песня первая'    },
        { num: 2, name: 'Песня вторая'    },
        { num: 3, name: 'Песня третья'    },
        { num: 4, name: 'Песня четвёртая' },
        { num: 5, name: 'Песня пятая'     },
        { num: 6, name: 'Песня шестая'    },
        { num: 7, name: 'Песня седьмая'   },
        { num: 8, name: 'Песня восьмая'   },
        { num: 9, name: 'Песня девятая'   },
    ];

    const EXTS  = ['mp3','ogg','wav','m4a','aac'];
    const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX'];

    let currentAudio  = null;
    let currentBtn    = null;
    let timerInterval = null;

    /* — Генерация кнопок — */
    const grid = document.getElementById('grid');
    SONGS.forEach((song, i) => {
        const btn = document.createElement('button');
        btn.className = 'song-btn';
        btn.innerHTML = `<span class="btn-num">${ROMAN[i]}</span>`;
        btn.addEventListener('click',      () => handleClick(song, btn));
        btn.addEventListener('touchstart', () => {}, { passive: true });
        grid.appendChild(btn);
    });

    document.getElementById('stopBtn').addEventListener('click', stopAll);

    /* — Воспроизведение — */
    function handleClick(song, btn) {
        if (currentBtn === btn) { stopAll(); return; }
        stopAll();
        tryPlay(song, btn, 0);
    }

    function tryPlay(song, btn, idx) {
        if (idx >= EXTS.length) {
            setDisplay('Файл не найден: sound/' + song.num, false);
            return;
        }
        const audio = new Audio(`sound/${song.num}.${EXTS[idx]}`);
        audio.play()
            .then(() => {
                currentAudio = audio;
                currentBtn   = btn;
                btn.classList.add('playing');
                setDisplay(song.name, true);
                startTimer();
                audio.addEventListener('ended', stopAll, { once: true });
            })
            .catch(() => tryPlay(song, btn, idx + 1));
    }

    function stopAll() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
        if (currentBtn) {
            currentBtn.classList.remove('playing');
            currentBtn = null;
        }
        stopTimer();
        setDisplay('— Выберите песню —', false);
    }

    /* — Дисплей — */
    function setDisplay(text, playing) {
        const song = document.getElementById('dispSong');
        const icon = document.getElementById('dispIcon');
        song.textContent = text;
        song.classList.toggle('active', playing);
        icon.textContent = playing ? '♫' : '♪';
        icon.classList.toggle('playing', playing);
        if (!playing) document.getElementById('dispTime').textContent = '';
    }

    /* — Таймер — */
    function startTimer() {
        stopTimer();
        let secs = 0;
        const el = document.getElementById('dispTime');
        timerInterval = setInterval(() => {
            secs++;
            const m = String(Math.floor(secs / 60)).padStart(2,'0');
            const s = String(secs % 60).padStart(2,'0');
            el.textContent = m + ':' + s;
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }
</script>
</body>
</html>
